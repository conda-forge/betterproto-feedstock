{% set name = "betterproto" %}
{% set version = "2.0.0b7" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/betterproto-{{ version }}.tar.gz
  sha256: 1b1458ca5278d519bcd62556a4c236f998a91d503f0f71c67b0b954747052af2

build:
  number: 0
  noarch: python
  entry_points:
    - protoc-gen-python_betterproto=betterproto.plugin:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python >=3.7
  run:
    - grpclib >=0.4.1,<0.5.0
    - python
    - python-dateutil >=2.8,<3.0
    - typing-extensions >=4.7.1,<5.0.0
    - importlib-metadata >=1.6.0  # [py<38]

test:
  imports:
    - betterproto
  commands:
    - pip check
  requires:
    - pip

about:
  home: http://github.com/danielgtaylor/python-betterproto
  summary: A better Protobuf / gRPC generator & library
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - asford
